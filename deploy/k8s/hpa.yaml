apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lucrum-web-hpa
  namespace: lucrum
  labels:
    app: lucrum-web
    app.kubernetes.io/name: lucrum
    app.kubernetes.io/part-of: lurus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lucrum-web
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
