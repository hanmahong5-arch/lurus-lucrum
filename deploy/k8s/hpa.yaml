apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-qtrd-web-hpa
  namespace: ai-qtrd
  labels:
    app: ai-qtrd-web
    app.kubernetes.io/name: ai-qtrd
    app.kubernetes.io/part-of: lurus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-qtrd-web
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
