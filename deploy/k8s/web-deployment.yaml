# ============================================
# AI-QTRD Web Frontend Deployment
# Next.js Application for Gushen
# Managed by ArgoCD for GitOps deployment
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-qtrd-web
  namespace: ai-qtrd
  labels:
    app: ai-qtrd-web
    component: frontend
    app.kubernetes.io/name: ai-qtrd
    app.kubernetes.io/component: web
    app.kubernetes.io/managed-by: argocd
spec:
  selector:
    matchLabels:
      app: ai-qtrd-web
      app.kubernetes.io/managed-by: argocd
      app.kubernetes.io/part-of: lurus
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: ai-qtrd-web
        component: frontend
        app.kubernetes.io/managed-by: argocd
        app.kubernetes.io/part-of: lurus
    spec:
      # Prefer worker node, but allow scheduling on master if worker is unavailable
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: [cloud-ubuntu-3-2c2g]
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: ai-qtrd-web
                topologyKey: kubernetes.io/hostname

      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: web
          image: ghcr.io/hanmahong5-arch/gushen-web:main
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http

          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            # API proxy configuration
            - name: API_URL
              value: "http://ai-qtrd-api:8000"

            # Lurus integration
            - name: LURUS_API_URL
              value: "https://api.lurus.cn"
            - name: LURUS_IDENTITY_URL
              value: "http://identity-service.lurus-identity.svc.cluster.local:18104"
            - name: LURUS_IDENTITY_INTERNAL_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-qtrd-secrets
                  key: LURUS_IDENTITY_INTERNAL_KEY
            - name: TENANT_SLUG
              value: "lurus"
            - name: NEXT_PUBLIC_LURUS_API_URL
              value: "https://api.lurus.cn"
            - name: NEXT_PUBLIC_TENANT_SLUG
              value: "lurus"

            # NextAuth.js + Zitadel OIDC
            - name: NEXTAUTH_URL
              value: "https://gushen.lurus.cn"
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: ai-qtrd-secrets
                  key: NEXTAUTH_SECRET
            - name: ZITADEL_ISSUER
              value: "https://auth.lurus.cn"
            - name: ZITADEL_CLIENT_ID
              value: "358400000000065537@lurus-api"
            - name: ZITADEL_CLIENT_SECRET
              value: ""

            # Database configuration
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ai-qtrd-secrets
                  key: DATABASE_URL

            # Memorus memory engine (fail-open: pod starts even if key absent)
            - name: MEMORUS_SERVICE_URL
              value: "http://memorus.lurus-system.svc.cluster.local:8880"
            - name: MEMORUS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-qtrd-secrets
                  key: MEMORUS_API_KEY
                  optional: true

            # Redis configuration
            - name: REDIS_ENABLED
              value: "true"
            - name: REDIS_HOST
              value: "redis-service.ai-qtrd.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-qtrd-secrets
                  key: REDIS_PASSWORD
            - name: REDIS_DB
              value: "0"

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nextjs-cache
              mountPath: /app/.next/cache

      restartPolicy: Always
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nextjs-cache
          emptyDir: {}
---
# Web Service (ClusterIP for internal access)
apiVersion: v1
kind: Service
metadata:
  name: ai-qtrd-web
  namespace: ai-qtrd
  labels:
    app: ai-qtrd-web
    component: frontend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app: ai-qtrd-web
