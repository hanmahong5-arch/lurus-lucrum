# ============================================
# Lucrum Web Frontend Deployment
# Next.js Application for Lucrum
# Managed by ArgoCD for GitOps deployment
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lucrum-web
  namespace: lucrum
  labels:
    app: lucrum-web
    component: frontend
    app.kubernetes.io/name: lucrum
    app.kubernetes.io/component: web
    app.kubernetes.io/managed-by: argocd
spec:
  selector:
    matchLabels:
      app: lucrum-web
      app.kubernetes.io/managed-by: argocd
      app.kubernetes.io/part-of: lurus
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: lucrum-web
        component: frontend
        app.kubernetes.io/managed-by: argocd
        app.kubernetes.io/part-of: lurus
    spec:
      # Pin to master node — cross-node overlay (flannel/WireGuard) is broken,
      # Traefik on master cannot reach pods on worker nodes via ClusterIP.
      nodeSelector:
        kubernetes.io/hostname: cloud-ubuntu-1-16c32g

      # Route auth.lurus.cn through Traefik ClusterIP (kube-system)
      # instead of public IP — avoids hairpin NAT failure from inside pod
      hostAliases:
        - ip: "10.43.175.138"
          hostnames:
            - "auth.lurus.cn"

      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: web
          image: ghcr.io/hanmahong5-arch/lucrum-web:main
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http

          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            # API proxy configuration
            - name: API_URL
              value: "http://lucrum-api:8000"

            # Lurus integration
            - name: LURUS_API_URL
              value: "https://api.lurus.cn"
            - name: LURUS_IDENTITY_URL
              value: "http://platform-core.lurus-platform.svc.cluster.local:18104"
            - name: LURUS_IDENTITY_INTERNAL_KEY
              valueFrom:
                secretKeyRef:
                  name: lucrum-secrets
                  key: LURUS_IDENTITY_INTERNAL_KEY
            - name: TENANT_SLUG
              value: "lurus"
            - name: NEXT_PUBLIC_LURUS_API_URL
              value: "https://api.lurus.cn"
            - name: NEXT_PUBLIC_TENANT_SLUG
              value: "lurus"

            # NextAuth.js + Zitadel OIDC
            - name: NEXTAUTH_URL
              value: "https://lucrum.lurus.cn"
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: lucrum-secrets
                  key: NEXTAUTH_SECRET
            - name: ZITADEL_ISSUER
              value: "https://auth.lurus.cn"
            - name: ZITADEL_CLIENT_ID
              value: "358400000000065537@lurus-api"
            - name: ZITADEL_CLIENT_SECRET
              value: ""

            # Database configuration
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: lucrum-secrets
                  key: DATABASE_URL

            # Memorus memory engine (fail-open: pod starts even if key absent)
            - name: MEMORUS_SERVICE_URL
              value: "http://memorus.lurus-system.svc.cluster.local:8880"
            - name: MEMORUS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lucrum-secrets
                  key: MEMORUS_API_KEY
                  optional: true

            # Redis configuration
            - name: REDIS_ENABLED
              value: "true"
            - name: REDIS_HOST
              value: "redis-service.lucrum.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lucrum-secrets
                  key: REDIS_PASSWORD
            - name: REDIS_DB
              value: "0"

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          startupProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24
            timeoutSeconds: 3

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nextjs-cache
              mountPath: /app/.next/cache

      restartPolicy: Always
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nextjs-cache
          emptyDir: {}
---
# Web Service (ClusterIP for internal access)
apiVersion: v1
kind: Service
metadata:
  name: lucrum-web
  namespace: lucrum
  labels:
    app: lucrum-web
    component: frontend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app: lucrum-web
