# ============================================
# Lucrum Web Frontend Deployment
# Next.js Application for Lucrum
# Managed by ArgoCD for GitOps deployment
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lucrum-web
  namespace: lucrum
  labels:
    app: lucrum-web
    component: frontend
    app.kubernetes.io/name: lucrum
    app.kubernetes.io/component: web
    app.kubernetes.io/managed-by: argocd
spec:
  selector:
    matchLabels:
      app: lucrum-web
      app.kubernetes.io/managed-by: argocd
      app.kubernetes.io/part-of: lurus
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: lucrum-web
        component: frontend
        app.kubernetes.io/managed-by: argocd
        app.kubernetes.io/part-of: lurus
    spec:
      # Lucrum prod moved off R1 to R6 single-node K3s on 2026-04-25 — there
      # is no longer a cross-node overlay to pin around, so no nodeSelector.
      # If we ever multi-node R6 or migrate back to R1, restore the master
      # affinity here (see git history for the R1 hostname).

      # NOTE: previous deploy had a hostAliases entry rewriting auth.lurus.cn
      # to the R1 Traefik ClusterIP (10.43.175.138) for hairpin-NAT bypass on
      # R1. R6 has no Traefik, so that override blackholed OIDC callbacks
      # (pod resolved auth.lurus.cn → unreachable IP). Removed; the pod now
      # resolves auth.lurus.cn via public DNS → R1 public IP, which works
      # because R6 has internet egress.

      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: web
          image: ghcr.io/hanmahong5-arch/lucrum-web:main
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http

          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            # API proxy configuration
            - name: API_URL
              value: "http://lucrum-api:8000"

            # Lurus integration
            - name: LURUS_API_URL
              value: "https://api.lurus.cn"
            - name: LURUS_IDENTITY_URL
              value: "http://platform-core.lurus-platform.svc.cluster.local:18104"
            - name: LURUS_IDENTITY_INTERNAL_KEY
              valueFrom:
                secretKeyRef:
                  name: lucrum-secrets
                  key: LURUS_IDENTITY_INTERNAL_KEY
            - name: TENANT_SLUG
              value: "lurus"
            - name: NEXT_PUBLIC_LURUS_API_URL
              value: "https://api.lurus.cn"
            - name: NEXT_PUBLIC_TENANT_SLUG
              value: "lurus"

            # NextAuth.js + Zitadel OIDC
            - name: NEXTAUTH_URL
              value: "https://lucrum.lurus.cn"
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: lucrum-secrets
                  key: NEXTAUTH_SECRET
            - name: ZITADEL_ISSUER
              value: "https://auth.lurus.cn"
            - name: ZITADEL_CLIENT_ID
              value: "358400000000065537@lurus-api"
            - name: ZITADEL_CLIENT_SECRET
              value: ""

            # Database configuration
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: lucrum-secrets
                  key: DATABASE_URL

            # Memorus memory engine (fail-open: pod starts even if key absent)
            - name: MEMORUS_SERVICE_URL
              value: "http://memorus.lurus-system.svc.cluster.local:8880"
            - name: MEMORUS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lucrum-secrets
                  key: MEMORUS_API_KEY
                  optional: true

            # LLM gateway — all model calls funnel through Lurus newapi
            # (https://newapi.lurus.cn/v1). Token is the lucrum-router entry
            # in newapi.tokens (user_id=1, unlimited_quota=true). Old vars
            # DEEPSEEK_API_BASE / LURUS_API_URL are intentionally omitted —
            # the router falls back to them only if LLM_API_* are unset, and
            # we want hard cutover.
            - name: LLM_API_BASE
              value: "https://newapi.lurus.cn/v1"
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lucrum-secrets
                  key: LLM_API_KEY

            # Redis configuration
            - name: REDIS_ENABLED
              value: "true"
            - name: REDIS_HOST
              value: "redis-service.lucrum.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lucrum-secrets
                  key: REDIS_PASSWORD
            - name: REDIS_DB
              value: "0"

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          startupProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24
            timeoutSeconds: 3

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nextjs-cache
              mountPath: /app/.next/cache

      restartPolicy: Always
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nextjs-cache
          emptyDir: {}
---
# Web Service — NodePort 30300 because the R6 host's nginx vhost
# (/etc/nginx/sites-enabled/lurus-stage on cloud-ubuntu-5-32c32g) forwards
# `lucrum.lurus.cn` → `127.0.0.1:30300`. Changing this nodePort requires a
# matching nginx config update.
apiVersion: v1
kind: Service
metadata:
  name: lucrum-web
  namespace: lucrum
  labels:
    app: lucrum-web
    component: frontend
spec:
  type: NodePort
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30300
      protocol: TCP
  selector:
    app: lucrum-web
