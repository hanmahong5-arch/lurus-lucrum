# Kustomization for Lucrum staging deployment
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: lucrum-staging

resources:
  - namespace.yaml
  - web-deployment.yaml

commonLabels:
  app.kubernetes.io/part-of: lurus
  app.kubernetes.io/managed-by: argocd
  environment: staging
