# ============================================
# Lucrum Web Frontend Deployment
# Next.js Application for Gushen
# Phase 8.5: Agentic Investment Advisor Architecture
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lucrum-web
  namespace: lucrum
  labels:
    app: lucrum-web
    component: frontend
    version: "1.1.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lucrum-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: lucrum-web
        component: frontend
    spec:
      # Schedule on worker node (cloud-ubuntu-3-2c2g)
      nodeSelector:
        kubernetes.io/hostname: cloud-ubuntu-3-2c2g

      containers:
        - name: web
          image: ghcr.io/hanmahong5-arch/lucrum-web:main
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http

          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            # API proxy configuration
            - name: API_URL
              value: "http://lucrum-api:8000"

            # Redis configuration
            - name: REDIS_ENABLED
              value: "true"
            - name: REDIS_HOST
              value: "redis-service.lucrum.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lucrum-secrets
                  key: REDIS_PASSWORD
            - name: REDIS_DB
              value: "0"

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

      restartPolicy: Always
