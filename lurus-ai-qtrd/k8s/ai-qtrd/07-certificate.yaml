# Lucrum TLS Certificate
# Let's Encrypt certificate for lucrum.lurus.cn
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lucrum-lurus-cn-tls
  namespace: lucrum
  labels:
    app.kubernetes.io/name: lucrum
    app.kubernetes.io/component: certificate
spec:
  secretName: lucrum-lurus-cn-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - lucrum.lurus.cn
