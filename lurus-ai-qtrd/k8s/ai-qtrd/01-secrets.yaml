# Lucrum Secrets
# Sensitive configuration for API keys and credentials
apiVersion: v1
kind: Secret
metadata:
  name: lucrum-secrets
  namespace: lucrum
  labels:
    app.kubernetes.io/name: lucrum
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # DeepSeek API configuration
  # Replace with actual API key before deployment
  DEEPSEEK_API_KEY: "sk-placeholder-replace-me"

  # Database password (URL encoded - @ becomes %40)
  # Using existing cluster PostgreSQL
  DATABASE_PASSWORD: "Lurus%40ops"

  # Redis password
  # Strong password for Redis authentication
  REDIS_PASSWORD: "Lucrum@Redis2026!"

  # lurus-platform internal API key
  # Used by lucrum-web to call /internal/v1/* on lurus-platform.
  # Must match INTERNAL_API_KEY set in the lurus-platform deployment.
  LURUS_IDENTITY_INTERNAL_KEY: "550a12e80ea35b65863037dc5032838275d392eede3ca1e4419c43ad61457544"
