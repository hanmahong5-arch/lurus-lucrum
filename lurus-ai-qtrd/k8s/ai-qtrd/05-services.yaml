# ============================================
# Lucrum Services
# Kubernetes services for internal and external access
# ============================================
---
# API Service (ClusterIP for internal access)
apiVersion: v1
kind: Service
metadata:
  name: lucrum-api
  namespace: lucrum
  labels:
    app.kubernetes.io/name: lucrum
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    app.kubernetes.io/name: lucrum
    app.kubernetes.io/component: api

---
# Web Service (ClusterIP for internal access)
apiVersion: v1
kind: Service
metadata:
  name: lucrum-web
  namespace: lucrum
  labels:
    app: lucrum-web
    component: frontend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app: lucrum-web
    component: frontend
