apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gushen-web
  namespace: ai-qtrd
  labels:
    app: gushen-web
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`gushen.lurus.cn`)
      kind: Rule
      services:
        - name: ai-qtrd-web
          port: 3000
  tls:
    secretName: lurus-cn-wildcard-tls
