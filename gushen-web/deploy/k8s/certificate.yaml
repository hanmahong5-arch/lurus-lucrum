# DEPRECATED: Superseded by wildcard certificate (deploy/cluster/cert-manager/wildcard-certificate.yaml)
# The wildcard cert "lurus-cn-wildcard-tls" covers *.lurus.cn + lurus.cn
# This file can be deleted after wildcard cert is deployed and verified.
#
# To clean up the old per-domain cert from the cluster:
#   kubectl delete certificate gushen-lurus-cn-tls -n ai-qtrd
#   kubectl delete secret gushen-lurus-cn-tls -n ai-qtrd
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: gushen-lurus-cn-tls
  namespace: ai-qtrd
spec:
  secretName: gushen-lurus-cn-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - gushen.lurus.cn
